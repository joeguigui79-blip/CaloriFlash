<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8bc34a" />
    <meta name="description" content="CaloriFlash - suivi calories 100% local" />
    <title>CaloriFlash</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="auth-overlay" class="overlay visible" aria-hidden="false">
      <div class="auth-card">
        <h1>CaloriFlash</h1>
        <p class="subtitle">Acces protege</p>
        <label for="password-input">Mot de passe</label>
        <input id="password-input" type="password" inputmode="text" autocomplete="off" />
        <button id="login-btn" class="btn-primary">Entrer</button>
        <p id="auth-error" class="error"></p>
      </div>
    </div>

    <header class="topbar">
      <div>
        <h2>CaloriFlash</h2>
        <p class="byline">by Joseph GUIGNARD</p>
      </div>
      <button id="theme-toggle" class="icon-btn" aria-label="Mode sombre">🌙</button>
    </header>

    <main id="app" class="app hidden">
      <section id="view-today" class="view active">
        <div class="card hero">
          <div>
            <p class="small-label">Aujourd'hui</p>
            <h3><span id="today-total">0</span> kcal</h3>
            <p>Objectif: <span id="goal-value">2000</span> kcal</p>
          </div>
          <div class="gauge">
            <svg viewBox="0 0 120 120" aria-hidden="true">
              <circle cx="60" cy="60" r="52" class="gauge-bg"></circle>
              <circle cx="60" cy="60" r="52" class="gauge-fill" id="gauge-ring"></circle>
            </svg>
            <span id="gauge-percent">0%</span>
          </div>
        </div>

        <div class="card">
          <label for="goal-input">Objectif calorique</label>
          <div class="inline-row">
            <input id="goal-input" type="number" min="800" max="8000" step="50" />
            <button id="save-goal-btn" class="btn-secondary">Enregistrer</button>
          </div>
        </div>

        <div class="meals-grid" id="meal-blocks"></div>

        <div class="quick-actions">
          <button id="shortcut-favorites" class="btn-secondary">Favoris</button>
          <button id="shortcut-recents" class="btn-secondary">Recents</button>
          <button id="shortcut-copy-yesterday" class="btn-secondary">Copier hier</button>
        </div>

        <button id="floating-add-btn" class="fab">+ Ajouter</button>
      </section>

      <section id="view-add" class="view">
        <div class="card">
          <h3>Ajout rapide</h3>
          <div class="search-wrap">
            <input id="quick-search" type="search" placeholder="Rechercher un aliment..." />
            <button id="open-scanner-btn" class="btn-secondary">Scanner</button>
          </div>
          <div class="inline-row">
            <select id="meal-select">
              <option value="petit-dejeuner">Petit-dejeuner</option>
              <option value="dejeuner">Dejeuner</option>
              <option value="diner">Diner</option>
              <option value="collations">Collations</option>
            </select>
            <select id="portion-select"></select>
            <input id="quantity-input" type="number" min="1" step="1" value="100" />
          </div>
          <button id="add-selected-btn" class="btn-primary">Ajouter au repas</button>
        </div>
        <div id="quick-lists" class="stack"></div>
      </section>

      <section id="view-meals" class="view">
        <div class="card">
          <h3>Mes repas types</h3>
          <div class="inline-row">
            <input id="meal-template-name" type="text" placeholder="Nom du repas type" />
            <button id="save-template-btn" class="btn-primary">Enregistrer</button>
          </div>
        </div>
        <div id="templates-list" class="stack"></div>
      </section>

      <section id="view-recipes" class="view">
        <div class="card">
          <h3>Recettes / Plats composes</h3>
          <div class="inline-row">
            <input id="recipe-name" type="text" placeholder="Nom de la recette" />
            <input id="recipe-portions" type="number" min="1" value="2" />
          </div>
          <div class="inline-row">
            <input id="recipe-search" type="search" placeholder="Ingredient..." />
            <input id="recipe-qty" type="number" min="1" value="100" />
            <button id="recipe-add-ing-btn" class="btn-secondary">Ajouter</button>
          </div>
          <ul id="recipe-ingredients" class="list"></ul>
          <p id="recipe-kcal"></p>
          <button id="save-recipe-btn" class="btn-primary">Enregistrer recette</button>
        </div>
        <div id="recipes-list" class="stack"></div>
      </section>

      <section id="view-stats" class="view">
        <div class="card">
          <h3>Statistiques (7 jours)</h3>
          <p>Moyenne: <strong id="avg-7days">0</strong> kcal</p>
          <p>Jours completes: <strong id="full-days">0</strong></p>
          <p>Repas frequents: <strong id="freq-foods">-</strong></p>
          <canvas id="stats-chart" width="320" height="170"></canvas>
        </div>
      </section>
    </main>

    <nav class="bottom-tabs">
      <button data-tab="today" class="active">Aujourd'hui</button>
      <button data-tab="add">Ajouter</button>
      <button data-tab="meals">Repas</button>
      <button data-tab="recipes">Recettes</button>
      <button data-tab="stats">Stats</button>
    </nav>

    <div id="toast" class="toast"></div>

    <div id="scanner-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h3>Scanner code-barres</h3>
        <video id="scanner-video" autoplay playsinline muted></video>
        <div class="inline-row">
          <input id="barcode-input" type="text" placeholder="Code-barres manuel" />
          <button id="scan-manual-btn" class="btn-secondary">Chercher</button>
        </div>
        <p id="scanner-result"></p>
        <div class="inline-row">
          <button id="scanner-close-btn" class="btn-secondary">Fermer</button>
        </div>
      </div>
    </div>

    <script src="./js/foods-db.js"></script>
    <script src="./js/db.js"></script>
    <script src="./js/search.js"></script>
    <script src="./js/meals.js"></script>
    <script src="./js/recipes.js"></script>
    <script src="./js/stats.js"></script>
    <script src="./js/scanner.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
